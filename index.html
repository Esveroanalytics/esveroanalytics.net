<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esvero Analytics</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #0f172a;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
}

h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

p {
    color: #94a3b8;
    margin-bottom: 30px;
}

.loader {
    display: flex;
    justify-content: center;
    gap: 10px;
}

.loader span {
    width: 12px;
    height: 12px;
    background: #38bdf8;
    border-radius: 50%;
    animation: bounce 0.6s infinite alternate;
}

.loader span:nth-child(2) {
    animation-delay: 0.2s;
}

.loader span:nth-child(3) {
    animation-delay: 0.4s;
}

@keyframes bounce {
    from {
        transform: translateY(0px);
        opacity: 0.5;
    }
    to {
        transform: translateY(-15px);
        opacity: 1;
    }
}
</style>

</head>
<body>

<div class="container">
    <h1>Esvero Analytics</h1>
    <p>Web sitemiz hazırlanıyor...</p>

    <div class="loader">
        <span></span>
        <span></span>
        <span></span>
    </div>
</div>

</body>
</html>
